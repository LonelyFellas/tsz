name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支新推送时取消进行中的旧任务。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本读取根 package.json 的 packageManager 字段。
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # 二次运行时恢复 turbo 缓存:未改动的包的 lint/typecheck/build 直接命中跳过。
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: |
            turbo-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Unit tests (with coverage thresholds)
        run: pnpm test:cov

      - name: Build
        run: pnpm build
