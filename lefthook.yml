pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,mjs,json,css,md}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx}"
      # monorepo 下 eslint 只装在各包内、且 flat config 按包隔离,故按包分组运行。
      run: node scripts/lint-staged.mjs {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  # lefthook 默认用 `git diff HEAD @{push}` 取「待推送文件」作为下面命令的触发依据。
  # 但新分支首次推送时 @{push} 尚不存在 → 文件集为空 → typecheck/test 被静默跳过
  # (开 PR 最常见的「首推」场景下,本地这道校验形同虚设,只能靠 CI 兜底)。
  # 自定义 files 命令补 fallback:@{push} → @{u} → 与 main 的三点 diff → 全部跟踪文件,
  # 保证首推也能算出文件并触发校验;无待推送提交时仍返回空、照常跳过,不会过度触发。
  files: git diff --name-only HEAD @{push} 2>/dev/null || git diff --name-only HEAD @{u} 2>/dev/null || git diff --name-only origin/main...HEAD 2>/dev/null || git ls-files
  commands:
    typecheck:
      run: pnpm typecheck
    # 跑带覆盖率阈值的测试,与 CI verify(pnpm test:cov)对齐,
    # 避免覆盖率不达标的改动本地全绿、推到 CI 才红。
    test:
      run: pnpm test:cov
    # e2e 不在 pre-push 跑:Playwright 要起服务、全量跑数分钟,是每次推送的最大等待项,
    # 且 CI 的 e2e job 跑同一套件兜底(合 main 仍有门禁)。推送前想自查可手动 pnpm test:e2e。
