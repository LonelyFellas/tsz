# Routing for the frontend tier. nginx terminates the public origin and splits:
#   /api/v1/*  -> Go backend (published on the host's :8080)
#   everything -> the app for that subdomain (web: Next SSR; admin: static SPA)
# Proxying /api here (instead of inside each app) keeps the API same-origin
# without baking the backend address into the build, so the images stay
# backend-address-agnostic.
#
# Flip to 443 + redirect once a TLS cert is in place (see README "HTTPS"). In
# mainland China the domain must be ICP-filed (备案) before Aliyun passes 80/443.

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# The Go backend, reached via the host gateway (see extra_hosts on the nginx
# service). It publishes :8080 on the host from its own compose (tshb-go).
upstream backend {
    server host.docker.internal:8080;
}

# User site — also the default server, so a bare-IP request lands here.
server {
    listen 80 default_server;
    server_name www.tianshengzhi.com tianshengzhi.com;

    location /api/v1/ {
        proxy_pass http://backend;
    }

    location / {
        proxy_pass http://web:3000;
    }
}

# Back office.
server {
    listen 80;
    server_name admin.tianshengzhi.com;

    location /api/v1/ {
        proxy_pass http://backend;
    }

    location / {
        proxy_pass http://admin:3001;
    }
}
