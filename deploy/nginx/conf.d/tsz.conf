# HTTP-only routing for the frontend tier. Flip to 443 + redirect once a TLS
# cert is in place (see README "HTTPS"). In mainland China the domain must be
# ICP-filed (备案) before Aliyun will pass 80/443 traffic for it.

# Shared proxy headers so Next/Go see the real client IP and scheme.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# User site — also the default server, so a bare-IP request lands here.
server {
    listen 80 default_server;
    server_name www.tianshengzhi.com tianshengzhi.com;

    location / {
        proxy_pass http://web:3000;
    }
}

# Back office.
server {
    listen 80;
    server_name admin.tianshengzhi.com;

    location / {
        proxy_pass http://admin:3001;
    }
}
