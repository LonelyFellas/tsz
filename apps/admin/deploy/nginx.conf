# admin 容器内的 nginx：托管 Vite 构建的静态 SPA，监听 :3001。
# 只负责静态资源 + SPA 回退；/api/v1 的后端分流由子域外层 nginx 负责
# （见 deploy/nginx/conf.d/tsz.conf），请求不会走到这里。
server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 传输压缩：Vite 产物是高度可压缩的明文 JS/CSS，原样传输在测试机受限带宽下
    # 会明显拖慢首屏（实测 385kB 的 chunk 走 ~0.7Mbps 要 4s+）。gzip 后体积约降到
    # 1/3，传输时间同比下降。外层 nginx / 临时门都是纯反代，会透传本层压缩结果。
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    # 带内容指纹的静态资源可长期强缓存。
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 是 SPA 外壳，绝不能被缓存：其引用的 /assets/<hash> 每次发版都变，
    # 客户端若缓存了旧 shell，会去请求已被删除的旧 chunk → 404 → 白屏。故强制不缓存，
    # 保证每次都取到指向最新指纹资源的 shell。
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA 回退：深链接（如 /users）找不到实体文件时交回 index.html，
    # 由 react-router 客户端接管路由。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
