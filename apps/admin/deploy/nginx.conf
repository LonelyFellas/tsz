# admin 容器内的 nginx：托管 Vite 构建的静态 SPA，监听 :3001。
# 只负责静态资源 + SPA 回退；/api/v1 的后端分流由子域外层 nginx 负责
# （见 deploy/nginx/conf.d/tsz.conf），请求不会走到这里。
server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 带内容指纹的静态资源可长期强缓存。
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 是 SPA 外壳，绝不能被缓存：其引用的 /assets/<hash> 每次发版都变，
    # 客户端若缓存了旧 shell，会去请求已被删除的旧 chunk → 404 → 白屏。故强制不缓存，
    # 保证每次都取到指向最新指纹资源的 shell。
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA 回退：深链接（如 /users）找不到实体文件时交回 index.html，
    # 由 react-router 客户端接管路由。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
