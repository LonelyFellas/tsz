# Production compose for the FRONTEND tier (web + admin + nginx) on the app ECS.
# The Go backend runs from its own repo/compose (tshb-go) and publishes :8080 on
# the host; nginx reaches it via host.docker.internal, so this stack is fully
# independent — nothing here touches the backend compose.
#
# Browser → nginx(:80):
#   /api/v1/* → Go backend :8080   (same-origin, so no CORS)
#   /*        → web (Next SSR) / admin (static SPA) by subdomain
# nginx (not the apps) proxies the API so the images stay backend-address-agnostic
# — see deploy/nginx/conf.d/tsz.conf. admin ships as a static Vite bundle served
# by its own nginx (apps/admin/Dockerfile); web stays a Next SSR node service.
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: "3000"
    expose:
      - "3000"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    # 静态 SPA 由容器内 nginx 固定监听 :3001（见 apps/admin/deploy/nginx.conf），
    # 无需 PORT 环境变量。
    expose:
      - "3001"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - admin
    ports:
      - "80:80"
      # 443 is wired once a TLS cert exists — see deploy/nginx/ and the README.
      # - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro   # mount certs for 443
    # Lets nginx resolve host.docker.internal -> the host, to reach the backend
    # published on :8080.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
