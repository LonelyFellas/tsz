# Production compose for the FRONTEND tier (web + admin + nginx) on the app ECS.
# The Go backend runs from its own repo/compose (tshb-go) and publishes :8080 on
# the host; these containers reach it via host.docker.internal, so this stack is
# fully independent — nothing here touches the backend compose.
#
# Browser → nginx(:80) → web/admin (Next SSR) → /api/v1 rewrite → backend :8080
# The browser never talks to the backend directly (same-origin via Next rewrite),
# so there is no CORS to configure.
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: "3000"
      # Next's rewrites() proxies /api/v1/* here at runtime. host-gateway lets the
      # container reach the backend published on the host's :8080.
      BACKEND_API_URL: "http://host.docker.internal:8080/api/v1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3000"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    environment:
      PORT: "3001"
      BACKEND_API_URL: "http://host.docker.internal:8080/api/v1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3001"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - admin
    ports:
      - "80:80"
      # 443 is wired once a TLS cert exists — see deploy/nginx/ and the README.
      # - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro   # mount certs for 443
    restart: unless-stopped
